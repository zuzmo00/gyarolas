
services:
  server:
    build:
      context: .
    environment:
      NODE_ENV: production
    ports:
      - 3000:3000

  db:
    image: postgres:latest
    volumes:
      - uj:/var/lib/postgresql
    environment:
      - POSTGRES_DB=example
      - POSTGRES_PASSWORD=password
      - POSTGRES_USER=user

    expose:
      - 5432
    ports:
      - 3001:5432
volumes:
  uj:

